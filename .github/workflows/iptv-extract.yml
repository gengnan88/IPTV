name: IPTV直播源提取

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]
permissions:
  contents: write
  pages: write
jobs:
  extract:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: pip install requests
    
    - name: 运行提取脚本
      run: python extract_iptv.py
    
    - name: 上传结果
      uses: actions/upload-artifact@v4
      with:
        name: iptv-sources
        path: output/
    
    - name: 部署到GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output
        publish_branch: gh-pages