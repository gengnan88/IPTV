name: IPTV直播源提取

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: pip install requests
    
    - name: 运行提取脚本
      run: python extract_iptv.py
    
    - name: 提交文件到仓库
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add -f output/iptv.m3u output/iptv.txt output/iptv.json 2>/dev/null || true
        git commit -m "自动更新IPTV直播源 - $(date '+%Y-%m-%d %H:%M:%S')" || echo "无变化"
        git push origin main