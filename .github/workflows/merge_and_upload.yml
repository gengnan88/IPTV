          def normalize_name(name):
              """统一频道名称：拼音缩写转中文，央视频道统一命名"""
              name_lower = name.lower().strip()
              original_name = name
              
              # 1. 先处理拼音缩写映射
              for pinyin, chinese in PINYIN_TO_CHINESE.items():
                  if name_lower == pinyin or name_lower.startswith(pinyin + '_') or name_lower == pinyin + 'hd':
                      return chinese
              
              # 2. 处理央视各种写法
              cctv_patterns = [
                  (r'cctv[-\s]*1', 'CCTV1综合'), (r'中央[一1台套]', 'CCTV1综合'),
                  (r'cctv[-\s]*2', 'CCTV2财经'), (r'中央[二2台套]', 'CCTV2财经'),
                  (r'cctv[-\s]*3', 'CCTV3综艺'), (r'中央[三3台套]', 'CCTV3综艺'),
                  (r'cctv[-\s]*4', 'CCTV4中文国际'), (r'中央[四4台套]', 'CCTV4中文国际'),
                  (r'cctv[-\s]*5\+?', 'CCTV5体育' if '5+' not in name_lower else 'CCTV5+'), (r'中央[五5台套]', 'CCTV5体育'),
                  (r'cctv[-\s]*6', 'CCTV6电影'), (r'中央[六6台套]', 'CCTV6电影'),
                  (r'cctv[-\s]*7', 'CCTV7国防军事'), (r'中央[七7台套]', 'CCTV7国防军事'),
                  (r'cctv[-\s]*8', 'CCTV8电视剧'), (r'中央[八8台套]', 'CCTV8电视剧'),
                  (r'cctv[-\s]*9', 'CCTV9纪录'), (r'中央[九9台套]', 'CCTV9纪录'),
                  (r'cctv[-\s]*10', 'CCTV10科教'), (r'中央[十10台套]', 'CCTV10科教'),
                  (r'cctv[-\s]*11', 'CCTV11戏曲'), (r'cctv[-\s]*12', 'CCTV12社会与法'),
                  (r'cctv[-\s]*13', 'CCTV13新闻'), (r'cctv[-\s]*14', 'CCTV14少儿'),
                  (r'cctv[-\s]*15', 'CCTV15音乐'), (r'cctv[-\s]*16', 'CCTV16奥林匹克'),
                  (r'cctv[-\s]*17', 'CCTV17农业农村'),
              ]
              for pattern, repl in cctv_patterns:
                  if re.search(pattern, name_lower):
                      return repl
              
              # 3. 处理重庆卫视
              if re.search(r'cqws|重庆', name_lower):
                  return '重庆卫视'
              
              # 4. 去掉常见后缀
              suffixes = ['高清', '超清', '标清', 'hd', '4k', '测试', '备用', '_hd']
              result = original_name
              for suffix in suffixes:
                  result = re.sub(rf'{suffix}$', '', result, flags=re.IGNORECASE)
              
              return result.strip()

