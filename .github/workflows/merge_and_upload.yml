name: IPTV直播源提取

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: pip install requests
    
    - name: 运行提取脚本
      run: python extract_iptv.py
    
    - name: 提交文件到仓库
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # 添加文件
        git add -f output/iptv.m3u output/iptv.txt output/iptv.json 2>/dev/null || true
        
        # 检查是否有变化
        if git diff --cached --quiet; then
          echo "无变化，跳过提交"
          exit 0
        fi
        
        # 提交
        git commit -m "自动更新IPTV直播源 - $(date '+%Y-%m-%d %H:%M:%S')"
        
        # 拉取远程更新并推送
        git pull origin main --rebase || true
        git push origin main