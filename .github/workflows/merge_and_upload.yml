name: 合并、分类并上传直播源

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  merge-and-classify:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载直播源文件
        run: |
          echo "正在下载直播源..."
          curl -sL https://raw.githubusercontent.com/fqw000/TVCrazy/refs/heads/main/output/itvlist.txt -o source1.txt || echo "源1下载失败"
          curl -sL https://raw.githubusercontent.com/liulei120/TVCrazy/refs/heads/main/output/itvlist.txt -o source2.txt || echo "源2下载失败"
          curl -sL https://raw.githubusercontent.com/Supprise0901/TVBox_live/main/live.txt -o source3.txt || echo "源3下载失败"
          echo "下载完成"

      - name: 创建处理脚本
        run: |
          cat > process.py << 'PYTHON_SCRIPT'
          import re
          import os

          # ==================== 拼音缩写到中文的映射表 ====================
          PINYIN_TO_CHINESE = {
              # 央视频道
              'cctv1': 'CCTV1综合', 'cctv1hd': 'CCTV1综合',
              'cctv2': 'CCTV2财经', 'cctv2hd': 'CCTV2财经',
              'cctv3': 'CCTV3综艺', 'cctv3hd': 'CCTV3综艺',
              'cctv4': 'CCTV4中文国际', 'cctv4hd': 'CCTV4中文国际',
              'cctv5': 'CCTV5体育', 'cctv5hd': 'CCTV5体育',
              'cctv5plus': 'CCTV5+', 'cctv5+': 'CCTV5+',
              'cctv6': 'CCTV6电影', 'cctv6hd': 'CCTV6电影',
              'cctv7': 'CCTV7国防军事', 'cctv7hd': 'CCTV7国防军事',
              'cctv8': 'CCTV8电视剧', 'cctv8hd': 'CCTV8电视剧',
              'cctv9': 'CCTV9纪录', 'cctv9hd': 'CCTV9纪录',
              'cctv10': 'CCTV10科教', 'cctv10hd': 'CCTV10科教',
              'cctv11': 'CCTV11戏曲', 'cctv11hd': 'CCTV11戏曲',
              'cctv12': 'CCTV12社会与法', 'cctv12hd': 'CCTV12社会与法',
              'cctv13': 'CCTV13新闻', 'cctv13hd': 'CCTV13新闻',
              'cctv14': 'CCTV14少儿', 'cctv14hd': 'CCTV14少儿',
              'cctv15': 'CCTV15音乐', 'cctv15hd': 'CCTV15音乐',
              'cctv16': 'CCTV16奥林匹克', 'cctv16hd': 'CCTV16奥林匹克',
              'cctv17': 'CCTV17农业农村', 'cctv17hd': 'CCTV17农业农村',
              'cgtn': 'CGTN', 'cgtnhd': 'CGTN',
              
              # 卫视台拼音缩写
              'ahws': '安徽卫视', 'ahws_hd': '安徽卫视',
              'bjws': '北京卫视', 'bjws_hd': '北京卫视',
              'cetv2': 'CETV2',
              'hljws': '黑龙江卫视', 'hljws_hd': '黑龙江卫视',
              'hebws': '河北卫视', 'hebws_hd': '河北卫视',
              'henws': '河南卫视', 'henws_hd': '河南卫视',
              'hnws': '湖南卫视', 'hnws_hd': '湖南卫视',
              'dfws': '东方卫视', 'dfws_hd': '东方卫视',
              'jsws': '江苏卫视', 'jsws_hd': '江苏卫视',
              'zjws': '浙江卫视', 'zjws_hd': '浙江卫视',
              'gdws': '广东卫视', 'gdws_hd': '广东卫视',
              'szws': '深圳卫视', 'szws_hd': '深圳卫视',
              'sdws': '山东卫视', 'sdws_hd': '山东卫视',
              'hbws': '湖北卫视', 'hbws_hd': '湖北卫视',
              'jlws': '吉林卫视', 'jlws_hd': '吉林卫视',
              'jxws': '江西卫视', 'jxws_hd': '江西卫视',
              'lnws': '辽宁卫视', 'lnws_hd': '辽宁卫视',
              'nxws': '宁夏卫视', 'nxws_hd': '宁夏卫视',
              'qhws': '青海卫视', 'qhws_hd': '青海卫视',
              'scws': '四川卫视', 'scws_hd': '四川卫视',
              'sxws': '山西卫视', 'sxws_hd': '山西卫视',
              'shxws': '陕西卫视', 'shxws_hd': '陕西卫视',
              'tjws': '天津卫视', 'tjws_hd': '天津卫视',
              'ynws': '云南卫视', 'ynws_hd': '云南卫视',
              'gxws': '广西卫视', 'gxws_hd': '广西卫视',
              'gzws': '贵州卫视', 'gzws_hd': '贵州卫视',
              'gsgs': '甘肃卫视', 'gsgs_hd': '甘肃卫视',
              'xjws': '新疆卫视', 'xjws_hd': '新疆卫视',
              'xzws': '西藏卫视', 'xzws_hd': '西藏卫视',
              'nmws': '内蒙古卫视', 'nmws_hd': '内蒙古卫视',
              'cqws': '重庆卫视', 'cqws_hd': '重庆卫视',
              'fjws': '东南卫视', 'fjws_hd': '东南卫视',
          }

          def normalize_name(name):
              """统一频道名称"""
              name_lower = name.lower().strip()
              original_name = name
              
              # 拼音缩写映射
              if name_lower in PINYIN_TO_CHINESE:
                  return PINYIN_TO_CHINESE[name_lower]
              
              # 央视各种写法
              if re.search(r'cctv[-\s]*1|中央[一1台套]', name_lower):
                  return 'CCTV1综合'
              if re.search(r'cctv[-\s]*2|中央[二2台套]', name_lower):
                  return 'CCTV2财经'
              if re.search(r'cctv[-\s]*3|中央[三3台套]', name_lower):
                  return 'CCTV3综艺'
              if re.search(r'cctv[-\s]*4|中央[四4台套]', name_lower):
                  return 'CCTV4中文国际'
              if re.search(r'cctv[-\s]*5\+?|中央[五5台套]', name_lower):
                  return 'CCTV5体育'
              if re.search(r'cctv[-\s]*6|中央[六6台套]', name_lower):
                  return 'CCTV6电影'
              if re.search(r'cctv[-\s]*7|中央[七7台套]', name_lower):
                  return 'CCTV7国防军事'
              if re.search(r'cctv[-\s]*8|中央[八8台套]', name_lower):
                  return 'CCTV8电视剧'
              if re.search(r'cctv[-\s]*9|中央[九9台套]', name_lower):
                  return 'CCTV9纪录'
              if re.search(r'cctv[-\s]*10|中央[十10台套]', name_lower):
                  return 'CCTV10科教'
              if re.search(r'cctv11|中央十一', name_lower):
                  return 'CCTV11戏曲'
              if re.search(r'cctv12|中央十二', name_lower):
                  return 'CCTV12社会与法'
              if re.search(r'cctv13|中央十三', name_lower):
                  return 'CCTV13新闻'
              if re.search(r'cctv14|中央十四', name_lower):
                  return 'CCTV14少儿'
              if re.search(r'cctv15|中央十五', name_lower):
                  return 'CCTV15音乐'
              if re.search(r'cctv16|中央十六', name_lower):
                  return 'CCTV16奥林匹克'
              if re.search(r'cctv17|中央十七', name_lower):
                  return 'CCTV17农业农村'
              
              # 重庆卫视
              if re.search(r'cqws|重庆', name_lower):
                  return '重庆卫视'
              
              # 去掉后缀
              result = re.sub(r'[_ ]?hd$|高清|超清|标清|4k|测试|备用', '', original_name, flags=re.IGNORECASE)
              return result.strip()

          def classify_channel(name):
              """分类频道"""
              if re.search(r'cctv|cgtn|中央|央视', name.lower()):
                  return "央视频道"
              if '卫视' in name:
                  return "卫视频道"
              return "其他频道"

          # 读取并合并所有源文件
          all_channels = {}
          
          for i in range(1, 4):
              filename = f'source{i}.txt'
              if not os.path.exists(filename):
                  print(f"文件 {filename} 不存在，跳过")
                  continue
                  
              with open(filename, 'r', encoding='utf-8') as f:
                  for line in f:
                      line = line.strip()
                      if not line or line.startswith('#') or line.endswith('#genre#'):
                          continue
                      if ',' not in line:
                          continue
                      
                      parts = line.split(',', 1)
                      raw_name = parts[0].strip()
                      url = parts[1].strip()
                      
                      if not url.startswith('http'):
                          continue
                      
                      norm_name = normalize_name(raw_name)
                      category = classify_channel(norm_name)
                      
                      if url not in all_channels:
                          all_channels[url] = (norm_name, category)

          print(f"合并去重后共 {len(all_channels)} 个频道")

          # 按分类分组
          grouped = {"央视频道": [], "卫视频道": [], "其他频道": []}
          
          for url, (name, category) in all_channels.items():
              grouped[category].append((name, url))

          # 生成TXT文件
          with open('iptv.txt', 'w', encoding='utf-8') as f:
              for category in ["央视频道", "卫视频道", "其他频道"]:
                  channels = grouped[category]
                  if not channels:
                      continue
                  channels.sort(key=lambda x: x[0])
                  for name, url in channels:
                      f.write(f"{name},{url}\n")

          print("文件已生成: iptv.txt")
          for category, channels in grouped.items():
              print(f"  {category}: {len(channels)} 个频道")
          PYTHON_SCRIPT

      - name: 运行处理脚本
        run: python3 process.py

      - name: 上传到又拍云
        env:
          UPYUN_BUCKET: ${{ secrets.UPYUN_BUCKET }}
          UPYUN_OPERATOR: ${{ secrets.UPYUN_OPERATOR }}
          UPYUN_PASSWORD_MD5: ${{ secrets.UPYUN_PASSWORD_MD5 }}
        run: |
          BUCKET="$UPYUN_BUCKET"
          OPERATOR="$UPYUN_OPERATOR"
          PASSWORD_MD5="$UPYUN_PASSWORD_MD5"
          REMOTE_PATH="/iptv.txt"
          LOCAL_FILE="./iptv.txt"
          
          if [ ! -f "$LOCAL_FILE" ]; then
            echo "错误: 文件 $LOCAL_FILE 不存在"
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s "$LOCAL_FILE")
          CONTENT_MD5=$(md5sum "$LOCAL_FILE" | cut -d' ' -f1)
          DATE=$(date -u -R | sed 's/+0000/GMT/')
          
          URI="/${BUCKET}${REMOTE_PATH}"
          MAC_STRING="PUT&${URI}&${DATE}&${CONTENT_MD5}"
          SIGNATURE=$(echo -n "$MAC_STRING" | openssl sha1 -hmac "$PASSWORD_MD5" -binary | base64)
          
          echo "正在上传到又拍云..."
          curl -X PUT "https://v0.api.upyun.com${URI}" \
            -H "Host: v0.api.upyun.com" \
            -H "Date: ${DATE}" \
            -H "Authorization: UPYUN ${OPERATOR}:${SIGNATURE}" \
            -H "Content-MD5: ${CONTENT_MD5}" \
            -H "Content-Length: ${FILE_SIZE}" \
            --data-binary "@${LOCAL_FILE}"
          
          echo ""
          echo "上传完成！"
          echo "CDN地址: https://${BUCKET}.test.upcdn.net${REMOTE_PATH}"

      - name: 显示结果预览
        run: |
          echo "=== 生成的文件预览 ==="
          head -20 iptv.txt
          echo ""
          echo "=== 统计信息 ==="
          echo "总频道数: $(wc -l < iptv.txt)"
